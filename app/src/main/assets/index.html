<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Italika CRM</title>
<style>
:root{--bg:#08111f;--bg2:#0d1830;--text:#eef4ff;--muted:#b8c5dd;--line:rgba(255,255,255,.12);--glass:rgba(255,255,255,.10);--glass2:rgba(255,255,255,.16);--accent:#79a9ff;--good:#63e69d;--bad:#ff7b7b;--card-min:250px;--shadow:0 24px 60px rgba(0,0,0,.28)}body.light{--bg:#edf3ff;--bg2:#dce9ff;--text:#0d1b34;--muted:#51617d;--glass:rgba(255,255,255,.56);--glass2:rgba(255,255,255,.76);--accent:#245fe7}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(121,169,255,.22),transparent 25%),linear-gradient(135deg,var(--bg),var(--bg2))}button,input,select{font:inherit}.glass{background:linear-gradient(135deg,var(--glass2),var(--glass));border:1px solid var(--line);backdrop-filter:blur(24px);box-shadow:var(--shadow)}.store-screen{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px;background:linear-gradient(135deg,#08111f,#0d1830)}.store-card{width:min(720px,100%);padding:30px;border-radius:34px;text-align:center}.store-card h1,h1{font-size:clamp(2rem,5vw,4rem);line-height:.95;letter-spacing:-.05em}.store-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.store-btn,.button,.menu-item{border:1px solid var(--line);background:var(--glass);color:var(--text);border-radius:22px;padding:16px;font-weight:900;cursor:pointer}.welcome{position:fixed;inset:0;z-index:90;display:none;place-items:center;background:rgba(8,17,31,.78);backdrop-filter:blur(18px)}.welcome.open{display:grid;animation:welcomeIn .45s ease both}.welcome.out{animation:welcomeOut .45s ease both}@keyframes welcomeIn{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}@keyframes welcomeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.96)}}.welcome-box{padding:34px;border-radius:32px;text-align:center}.topbar{position:sticky;top:0;z-index:30;backdrop-filter:blur(20px);background:rgba(8,17,31,.55);border-bottom:1px solid var(--line)}.nav{max-width:1280px;margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px}.brand-logo{height:46px;max-width:160px;object-fit:contain}.store-title{font-size:clamp(1rem,3vw,1.8rem);font-weight:950;letter-spacing:-.04em;text-transform:uppercase}.input,.select,.field input,.field select{border:1px solid var(--line);background:var(--glass);color:var(--text);border-radius:16px;padding:12px 16px;width:100%}.search-wrap{position:relative;flex:1;max-width:360px}.loaderOverlay{position:fixed;inset:0;z-index:80;display:none;place-items:center;background:rgba(5,10,20,.28);backdrop-filter:blur(7px)}.loaderOverlay.open{display:grid}.dotsBig{display:flex;gap:8px;padding:22px 26px;border-radius:28px}.dotsBig span{width:11px;height:11px;background:var(--accent);border-radius:50%;animation:b .55s infinite alternate}.dotsBig span:nth-child(2){animation-delay:.12s}.dotsBig span:nth-child(3){animation-delay:.24s}@keyframes b{to{transform:translateY(-9px)}}.icon-btn{width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:var(--glass);color:var(--text);font-size:1.3rem}.shell{max-width:1280px;margin:auto;padding:18px}.hero,.panel{border-radius:30px;padding:26px;margin-bottom:18px}.eyebrow,.tag,.pill,.price-chip{display:inline-flex;padding:8px 12px;border-radius:999px;background:var(--glass);border:1px solid var(--line);color:var(--accent);font-weight:800;font-size:.82rem}.tag{font-size:.72rem;text-transform:uppercase}.pill,.price-chip{color:var(--muted);font-weight:500}.view{display:none}.view.active{display:block}.section-title,.category-head,.price-row,.actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(var(--card-min),1fr));gap:20px}.card{border-radius:24px;overflow:hidden;cursor:pointer}.image-wrap{aspect-ratio:4/3;border-bottom:1px solid var(--line)}.image-wrap img,.detail-img{width:100%;height:100%;object-fit:cover;display:block}.card-body{padding:16px;display:grid;gap:10px}.category-section{margin-bottom:34px}.drawer-backdrop,.modal{position:fixed;inset:0;background:rgba(0,0,0,.34);opacity:0;visibility:hidden;transition:.2s;z-index:50}.drawer-backdrop.open,.modal.open{opacity:1;visibility:visible}.drawer{position:fixed;top:0;right:0;width:min(420px,92vw);height:100vh;z-index:60;transform:translateX(100%);transition:.25s;padding:16px}.drawer.open{transform:translateX(0)}.drawer-card{height:100%;border-radius:28px;padding:18px;overflow:auto}.menu-list,.list{display:grid;gap:10px;margin-top:16px}.menu-item{text-align:left}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.field{display:grid;gap:8px}.field label{color:var(--muted);font-weight:700}.row{border-radius:20px;padding:15px;background:var(--glass);border:1px solid var(--line);cursor:pointer}.row small{color:var(--muted)}.success{background:rgba(80,220,130,.12);border-color:rgba(80,220,130,.25)}.danger{background:rgba(255,123,123,.12);border-color:rgba(255,123,123,.25)}.detail-card{max-width:1180px;margin:18px auto;height:calc(100vh - 36px);border-radius:30px;overflow:auto;display:grid;grid-template-columns:1.1fr .9fr}.detail-visual{min-height:420px;border-right:1px solid var(--line)}.detail-body{padding:24px;display:grid;gap:16px;align-content:start}.spec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.spec{padding:13px;border-radius:16px;background:var(--glass);border:1px solid var(--line)}.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:120;padding:16px 20px;border-radius:22px;display:none;max-width:92vw}.toast.open{display:block}@media(max-width:900px){.detail-card{grid-template-columns:1fr}.detail-visual{min-height:280px;border-right:0;border-bottom:1px solid var(--line)}}</style></head><body>
<div id="storeScreen" class="store-screen"><div class="store-card glass"><span class="eyebrow">Selecciona tu tienda</span><h1>¿En qué tienda estás?</h1><p>Elige tu agencia para iniciar.</p><div class="store-options"><button class="store-btn" onclick="chooseStore('ITALIKA MALACATÁN')">ITALIKA MALACATÁN</button><button class="store-btn" onclick="chooseStore('ITALIKA SAN PABLO')">ITALIKA SAN PABLO</button></div></div></div><div id="welcome" class="welcome"><div class="welcome-box glass"><span class="eyebrow">Bienvenido a agencia</span><h1 id="welcomeText"></h1></div></div><div id="toast" class="toast glass"></div><div id="loaderOverlay" class="loaderOverlay"><div class="dotsBig glass"><span></span><span></span><span></span></div></div>
<header class="topbar"><div class="nav"><div class="brand"><img id="brandLogo" class="brand-logo"><div id="storeTitle" class="store-title">CATÁLOGO ITALIKA</div></div><div class="search-wrap"><input id="searchInput" class="input" placeholder="Buscar..."></div><button id="menuBtn" class="icon-btn">☰</button></div></header>
<main class="shell">
<section id="catalogView" class="view active"><div class="hero glass"><span class="eyebrow">Catálogo por categorías</span><h1>CATÁLOGO ITALIKA</h1></div><div id="catalogSections"></div></section>
<section id="tasksView" class="view"><div class="hero glass"><h1>PENDIENTES</h1></div><div class="panel glass"><div class="form-grid"><div class="field"><label>Descripción</label><input id="taskText"></div><div class="field"><label>Fecha y hora límite</label><input id="taskTime" type="datetime-local"></div></div><br><button class="button" onclick="saveTask()">Guardar pendiente</button></div><div id="tasksList" class="list"></div></section>
<section id="leadsView" class="view"><div class="hero glass"><h1>CLIENTES POTENCIALES</h1></div><div class="panel glass"><div class="form-grid"><div class="field"><label>Nombre</label><input id="leadName"></div><div class="field"><label>Teléfono</label><input id="leadPhone"></div><div class="field"><label>Moto</label><select id="leadMoto" onchange="updateHook()"></select></div><div class="field"><label>Tipo de compra</label><select id="leadType" onchange="toggleCredit()"><option>Contado</option><option>Crédito</option><option>Visacuotas</option></select></div><div id="hookField" class="field"><label>Enganche</label><input id="leadHook" type="number"></div></div><br><button class="button" onclick="saveLead()">Guardar cliente</button></div><div id="leadsList" class="list"></div></section>
<section id="buyersView" class="view"><div class="hero glass"><h1>CLIENTES CON COMPRA</h1></div><div class="panel glass"><div class="form-grid"><div class="field"><label>Nombre</label><input id="buyerName"></div><div class="field"><label>Teléfono</label><input id="buyerPhone"></div><div class="field"><label>Moto</label><select id="buyerMoto"></select></div><div class="field"><label>Fecha compra</label><input id="buyerDate" type="date"></div></div><br><button class="button" onclick="saveBuyer()">Guardar compra</button></div><div id="buyersList" class="list"></div></section>
<section id="serviceView" class="view"><div class="hero glass"><h1>SERVICIOS PENDIENTES</h1></div><div id="serviceAlerts" class="list"></div></section>

<section id="editMotosView" class="view">
  <div class="hero glass">
    <h1>EDITAR MOTOS</h1>
  </div>
  <div class="panel glass">
    <div class="form-grid">
      <div class="field">
        <label>Moto</label>
        <select id="editMotoSelect" onchange="loadMotoEdit()"></select>
      </div>
      <div class="field">
        <label>Precio contado</label>
        <input id="editContado" type="number" min="0" step="1">
      </div>
      <div class="field">
        <label>Precio crédito</label>
        <input id="editCredito" type="number" min="0" step="1">
      </div>
    </div>
    <br>
    <div class="actions">
      <button class="button success" onclick="saveMotoEdit()">Guardar cambios</button>
      <button class="button danger" onclick="resetMotoEdit()">Restablecer moto</button>
    </div>
  </div>
  <div id="motosEditList" class="list"></div>
</section>

<section id="settingsView" class="view"><div class="hero glass"><h1>AJUSTES</h1></div><div class="panel glass"><div class="form-grid"><div class="field"><label>Tema</label><select id="themeSelect" onchange="applyTheme(this.value)"><option value="dark">Oscuro</option><option value="light">Claro</option></select></div><div class="field"><label>Tamaño tarjetas</label><input id="sizeRange" type="range" min="220" max="360" step="10" oninput="applySize(this.value)"></div></div></div></section>
</main>
<div id="backdrop" class="drawer-backdrop"></div><aside id="drawer" class="drawer"><div class="drawer-card glass"><div class="section-title"><h2>Menú</h2><button class="icon-btn" onclick="closeMenu()">✕</button></div><div class="menu-list"><button class="menu-item" onclick="showView('catalogView')">🏍 Catálogo</button><button class="menu-item" onclick="showView('leadsView')">👥 Clientes potenciales</button><button class="menu-item" onclick="showView('buyersView')">🛒 Clientes con compra</button><button class="menu-item" onclick="showView('serviceView')">🔧 Servicios pendientes</button><button class="menu-item" onclick="showView('tasksView')">📋 Pendientes</button><button class="menu-item" onclick="showView('editMotosView')">💰 Editar motos</button><button class="menu-item" onclick="showView('settingsView')">⚙ Ajustes</button><button class="menu-item" onclick="changeStore()">🏪 Cambiar tienda</button></div></div></aside>
<div id="detailModal" class="modal"><div class="detail-card glass"><div class="detail-visual"><img id="detailImg" class="detail-img"></div><div class="detail-body"><div class="section-title"><div><span id="detailCat" class="tag"></span><h1 id="detailName"></h1></div><button class="icon-btn" onclick="closeDetail()">✕</button></div><div class="price-row"><span id="detailPrice" class="price-chip"></span></div><div id="detailSpecs" class="spec-grid"></div><button class="button success" onclick="leadFromCurrentMoto()">Cliente interesado</button><button class="button" onclick="closeDetail()">Regresar</button></div></div></div>
<div id="leadProfile" class="modal"><div class="detail-card glass"><div class="detail-visual"><img id="leadImg" class="detail-img"></div><div class="detail-body"><div class="section-title"><h1 id="leadProfileName"></h1><button class="icon-btn" onclick="leadProfile.classList.remove('open')">✕</button></div><div id="leadProfileData" class="spec-grid"></div><div class="field"><label>Estado del cliente</label><select id="leadStatus"></select></div><button class="button" onclick="saveLeadStatus()">Guardar estado</button><button class="button success" onclick="leadToBuyer()">Ya compró</button></div></div></div>
<div id="buyerProfile" class="modal"><div class="detail-card glass"><div class="detail-visual"><img id="buyerImg" class="detail-img"></div><div class="detail-body"><div class="section-title"><h1 id="buyerProfileName"></h1><button class="icon-btn" onclick="buyerProfile.classList.remove('open')">✕</button></div><div id="buyerProfileData" class="spec-grid"></div><button class="button success" onclick="serviceDone()">Servicio del cliente listo</button></div></div></div>
<script>
const ORIGINAL_PRODUCTS=[{"name": "D125", "imageBase": "D125", "category": "Pasolas", "contado": 8999, "credito": 8999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "WS150", "imageBase": "WS150", "category": "Pasolas", "contado": 9999, "credito": 9999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "DS150", "imageBase": "DS150", "category": "Pasolas", "contado": 10999, "credito": 10999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "BIT150", "imageBase": "BIT150", "category": "Pasolas", "contado": 10499, "credito": 10499, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "AT110", "imageBase": "AT110", "category": "Trabajo", "contado": 6499, "credito": 6499, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "GTK125", "imageBase": "GTK125", "category": "Trabajo", "contado": 8999, "credito": 8999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "GTK125X", "imageBase": "GTK125X", "category": "Trabajo", "contado": 9999, "credito": 9999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "TITAN250", "imageBase": "TITAN250", "category": "Trabajo", "contado": 22999, "credito": 22999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "125Z", "imageBase": "125Z", "category": "Línea Z", "contado": 7999, "credito": 7999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "150Z", "imageBase": "150Z", "category": "Línea Z", "contado": 11999, "credito": 11999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "200Z", "imageBase": "200Z", "category": "Línea Z", "contado": 13999, "credito": 13999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "250Z", "imageBase": "250Z", "category": "Línea Z", "contado": 17499, "credito": 17499, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "280Z", "imageBase": "280Z", "category": "Línea Z", "contado": 18499, "credito": 18499, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "BLACKBIRD250", "imageBase": "BLACKBIRD250", "category": "Café Racer", "contado": 15999, "credito": 15999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "RT250G", "imageBase": "RT250G", "category": "Deportiva", "contado": 17999, "credito": 17999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "VORTX250", "imageBase": "VORTX250", "category": "Deportiva", "contado": 17999, "credito": 17999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "DM125", "imageBase": "DM125", "category": "Todo Terreno", "contado": 7999, "credito": 7999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "DM150", "imageBase": "DM150", "category": "Todo Terreno", "contado": 9999, "credito": 9999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "DM200", "imageBase": "DM200", "category": "Todo Terreno", "contado": 10499, "credito": 10499, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "DM250", "imageBase": "DM250", "category": "Todo Terreno", "contado": 10999, "credito": 10999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "DM300", "imageBase": "DM300", "category": "Todo Terreno", "contado": 15499, "credito": 15499, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "ATV150", "imageBase": "ATV150", "category": "ATV", "contado": 15999, "credito": 15999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "ATV180", "imageBase": "ATV180", "category": "ATV", "contado": 17999, "credito": 17999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "ATV200", "imageBase": "ATV200", "category": "ATV", "contado": 20999, "credito": 20999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}, {"name": "ATV250", "imageBase": "ATV250", "category": "ATV", "contado": 26999, "credito": 26999, "specs": {"Motor": "Consultar ficha", "Cilindrada": "Consultar ficha", "Velocidad": "Consultar ficha", "Transmisión": "Consultar ficha", "Potencia": "Consultar ficha"}}];
let PRODUCTS=loadMotoPrices();
function loadMotoPrices(){
  const overrides=JSON.parse(localStorage.getItem('motoPrices')||'{}');
  return JSON.parse(JSON.stringify(ORIGINAL_PRODUCTS)).map(p=>overrides[p.name]?{...p,...overrides[p.name]}:p);
}
function saveMotoPrices(){
  const overrides={};
  PRODUCTS.forEach(p=>{
    const original=ORIGINAL_PRODUCTS.find(x=>x.name===p.name);
    if(original&&(Number(p.contado)!==Number(original.contado)||Number(p.credito)!==Number(original.credito))){
      overrides[p.name]={contado:Number(p.contado),credito:Number(p.credito)};
    }
  });

function fillMotoEdit(){

function saveMotoEdit(){
  const p=PRODUCTS.find(x=>x.name===editMotoSelect.value);
